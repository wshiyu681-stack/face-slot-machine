<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0a3d0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15vh 10px 20px 10px;
        }

        h2 {
            margin-bottom: 20px;
            color: #f1c40f;
        }

        #video-container {
            position: relative;
            width: 320px;
            height: 240px;
            border: 4px solid #333;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slot-machine {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 25px;
            border: 5px solid #f1c40f;
            box-shadow: 0 0 3px #6c5ce7e, 0 0 30px rgba(241, 196, 15, 0.5);
        }

        .reel {
            width: 120px;
            height: 120px;
            background: #33383b;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            border: 2px solid #f1c40f;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8)
        }

        .emoji-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            width: 100%;
            top: 0;
            filter: drop-shadow(0px 0px 2px #f1c40f)
        }

        .emoji-item {
            width: 120px;
            height: 120px;
            font-size: 80px;
            line-height: 120px;
            text-align: center;
            user-select: none;
        }

        button {
            margin-top: 30px;
            padding: 16px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #ffba0c;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            color: #f6ff00;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #ff0000;
        }

        button:hover {
            background: #f39c12;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c29d0b;
        }

        button:disabled {
            background: #555;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        #status {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #f1c40f;
            height: 20px;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" autoplay muted></video>
    </div>

    <div class="slot-machine">
        <div class="reel"><div class="emoji-container" id="reel1"></div></div>
        <div class="reel"><div class="emoji-container" id="reel2"></div></div>
        <div class="reel"><div class="emoji-container" id="reel3"></div></div>
    </div>

    <button id="spinBtn" onclick="detectAndSpin()" disabled>等待模型加载...</button>
    <div id="status">正在初始化 AI 模型...</div>

    <script>
        const video = document.getElementById('video');
        const reel1 = document.getElementById('reel1');
        const reel2 = document.getElementById('reel2');
        const reel3 = document.getElementById('reel3');
        const status = document.getElementById('status');
        const btn = document.getElementById('spinBtn');

        const emojiMap = {
            'neutral': '😐',
            'happy': '😊',
            'sad': '😭',
            'angry': '😡',
            'surprised': '😲',
            'fearful': '😨',
            'disgusted': '🤢'
        };
        const emojiList = Object.values(emojiMap);
        const itemHeight = 120;

        function initReels() {
            for (let i = 0; i < 5; i++) {
                emojiList.forEach(emoji => {
                    reel1.appendChild(createEmoji(emoji));
                    reel2.appendChild(createEmoji(emoji));
                    reel3.appendChild(createEmoji(emoji));
                });
            }
        }

        function createEmoji(emoji) {
            const div = document.createElement('div');
            div.className = 'emoji-item';
            div.innerText = emoji;
            return div;
        }

        async function init() {
            try {
                initReels();

                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;

                status.innerText = "准备就绪，请面对镜头";
                btn.innerText = "识别并开始抽奖";
                btn.disabled = false;
            } catch (err) {
                status.innerText = "错误: 无法访问摄像头或模型加载失败";
                console.error(err);
            }
        }

        async function detectAndSpin() {
            btn.disabled = true;
            status.innerText = "正在分析你的表情...";

            const detections = await faceapi
                .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceExpressions();

            if (!detections) {
                status.innerText = "未检测到人脸，请重试";
                btn.disabled = false;
                return;
            }

            const expressions = detections.expressions;
            const topExpression = Object.keys(expressions).reduce((a, b) => 
                expressions[a] > expressions[b] ? a : b
            );
            const targetEmoji = emojiMap[topExpression];
            const targetIdx = emojiList.indexOf(targetEmoji);
            
            const totalRounds = 3;
            const finalY = (totalRounds * emojiList.length + targetIdx) * itemHeight;

            // 三个滚轮完全同步，全部停在同一个表情
            [reel1, reel2, reel3].forEach(reel => {
                reel.style.transition = 'none';
                reel.style.transform = `translateY(0px)`;
                reel.offsetHeight;

                reel.style.transition = 'transform 3s cubic-bezier(0.15, 0, 0.15, 1)';
                reel.style.transform = `translateY(-${finalY}px)`;
            });
            setTimeout(() => {
                btn.disabled = false;
                status.innerText = `🎉 全部相同！你的表情是：${targetEmoji}`;
            }, 3200);
        }

        init();
    </script>
</body>
</html>
